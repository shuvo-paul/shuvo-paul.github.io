{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}
{{ define "main" }}
<div class="container">
  <div class="max-w-4xl mx-auto mt-24 md:mt-28 border-b pb-14 md:pb-24">
    <h1 class="mb-14 lg:mb-24 text-2xl md:text-3xl border-b pb-2 md:pb-4 font-serif">{{ .Title }}</h1>
    <div class="story-content">
      {{ .Content }}
    </div>
    <div class="text-sm text-gray-600 mt-12">Last Update: {{ .Date | time.Format "2 - Jan - 06" }}</div>
  </div>
</div>
{{ end }}
