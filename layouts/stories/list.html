{{ define "title" }}Stories - {{ .Site.Title }}{{ end }}
{{ define "main" }}
<div class="container">
  <div class="max-w-4xl mx-auto mt-24 md:mt-28 border-b pb-14 md:pb-24">
    <h1 class="mb-14 lg:mb-24 text-2xl md:text-3xl border-b pb-2 md:pb-4 font-serif">Stories</h1>
    
    {{ range .Pages.ByDate.Reverse }}
      <a class="my-4 block" href="{{ .RelPermalink }}">
        <div class="flex flex-row flex-wrap items-center">
          <div class="mr-2">➪</div>
          <h2 class="font-serif">{{ .Title }}</h2>
          <div class="text-sm text-gray-600 ml-2">({{ .Date | time.Format "2 - Jan - 06" }})</div>
        </div>
      </a>
    {{ end }}
  </div>
</div>
{{ end }}
